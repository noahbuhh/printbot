server {
  listen 80;
  server_name localhost;
  resolver 127.0.0.11 valid=10s;  # Docker DNS - re-resolve every 10s

  location /door-motor/ {
    set $upstream_door door-motor;
    rewrite ^/door-motor/(.*) /$1 break;
    proxy_pass http://$upstream_door:3000;
  }

  location /printer-monitor/ {
    set $upstream_pm printer-monitor;
    rewrite ^/printer-monitor/(.*) /$1 break;
    proxy_pass http://$upstream_pm:5000;
  }

  location / {
    set $upstream_web web;
    proxy_pass http://$upstream_web:3000;
  }
}
