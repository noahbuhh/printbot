version: "2.1"

volumes:
  printer-data:

services:
  nginx:
    build: ./nginx
    restart: always
    ports:
      - 80:80
  #sample1:
  #  build: ./sample-app
  #  environment:
  #    SERVICE_NAME: "sample1"
  web:
    build: ./web
    restart: always
    ports:
      - 3000:3000
  door-motor:
    build: ./door-motor
    privileged: true # Required for GPIO access
    restart: always
    devices:
      - "/dev/gpiochip0:/dev/gpiochip0"
  #  network_mode: "host"
  printer-monitor:
    build: ./printer-monitor
    restart: always
    volumes:
      - printer-data:/data
  ustreamer:
    build: ./ustreamer
    devices:
      - "/dev/video0:/dev/video0"
    privileged: true
